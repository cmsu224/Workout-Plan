<svg viewBox="0 0 100 100" class="w-full h-full text-gray-800 dark:text-gray-200 object-contain p-4" xmlns="http://www.w3.org/2000/svg" stroke-linejoin="round">
  <!-- Band anchor on right wall -->
  <rect x="87" y="28" width="5" height="18" fill="currentColor" opacity="0.3"/>

  <!-- Static body -->
  <circle cx="30" cy="20" r="7" fill="currentColor"/><circle cx="33" cy="18" r="2.5" class="ex-eye"/>
  <line x1="30" y1="27" x2="30" y2="57" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
  <path d="M 30 57 L 22 92 M 30 57 L 38 92" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Arm: extends forward toward anchor, pulls back to face level with elbow flared -->
  <path stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none">
    <animate attributeName="d"
      values="M 30 33 L 55 33 L 80 33; M 30 33 L 55 28 L 45 20; M 30 33 L 55 33 L 80 33"
      dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>
