<svg viewBox="0 0 100 100" class="w-full h-full text-gray-800 dark:text-gray-200 object-contain p-4" xmlns="http://www.w3.org/2000/svg" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="50" cy="28" r="7" fill="currentColor"/><circle cx="53" cy="26" r="2.5" class="ex-eye"/>
  <!-- Body -->
  <line x1="50" y1="35" x2="50" y2="63" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M 50 63 L 42 95 M 50 63 L 58 95" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Upper arm: straight up overhead (static) -->
  <line x1="50" y1="42" x2="50" y2="22" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>

  <!-- Forearm: loaded = bent behind head, extended = straight overhead -->
  <path stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none">
    <animate attributeName="d"
      values="M 50 22 L 38 32; M 50 22 L 50 8; M 50 22 L 38 32"
      dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Dumbbell follows forearm tip -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="38,32; 50,8; 38,32" dur="2s" repeatCount="indefinite"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="currentColor" stroke-width="4"/>
    <rect x="-10" y="-6" width="4" height="12" fill="currentColor"/>
    <rect x="6" y="-6" width="4" height="12" fill="currentColor"/>
  </g>
</svg>
