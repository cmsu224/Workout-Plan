<svg viewBox="0 0 100 100" class="w-full h-full text-gray-800 dark:text-gray-200 object-contain p-4" xmlns="http://www.w3.org/2000/svg" stroke-linejoin="round">
  <!-- Bench -->
  <rect x="58" y="50" width="32" height="8" fill="currentColor" opacity="0.2"/>
  <rect x="62" y="58" width="5" height="20" fill="currentColor" opacity="0.2"/>
  <rect x="78" y="58" width="5" height="20" fill="currentColor" opacity="0.2"/>

  <!-- Head (resting on bench, static) -->
  <circle cx="68" cy="43" r="7" fill="currentColor"/><circle cx="71" cy="41" r="2.5" class="ex-eye"/>

  <!-- Floor line -->
  <line x1="5" y1="92" x2="58" y2="92" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Shins (feet stay on floor, static) -->
  <line x1="15" y1="92" x2="28" y2="65" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>

  <!-- Torso + thighs: hips rise from dropped to bridge position -->
  <path stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none">
    <animate attributeName="d"
      values="M 62 54 L 40 72 L 28 65; M 62 54 L 40 54 L 28 65; M 62 54 L 40 72 L 28 65"
      dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Dumbbell on hips, follows hip position -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="40,66; 40,48; 40,66" dur="2.5s" repeatCount="indefinite"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="currentColor" stroke-width="4"/>
    <rect x="-12" y="-10" width="4" height="12" fill="currentColor"/>
    <rect x="8" y="-10" width="4" height="12" fill="currentColor"/>
  </g>
</svg>
